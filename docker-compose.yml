services:
  db:
    image: postgres:16-alpine
    container_name: attendance_db
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: attendance_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://attendance:attendance@db:5432/attendance_db?schema=public
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm run start"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_USE_MOCK: "false"
    container_name: attendance_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
